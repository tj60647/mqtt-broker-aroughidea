# Config file for mosquitto
#
# See mosquitto.conf(5) for more information.

persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_dest file /mosquitto/log/mosquitto.log

# Apply auth and ACL settings globally across all listeners.
per_listener_settings false

# Security Settings
allow_anonymous false
password_file /mosquitto/config/passwords
acl_file /mosquitto/config/acl

# Listener: Standard MQTT (1883)
# WARNING: This listener is unencrypted. In production, restrict it to loopback
# or disable it entirely if all clients can use MQTTS (8883).
# To restrict to loopback only, change the line below to: listener 1883 127.0.0.1
listener 1883
protocol mqtt

# Listener: MQTTS (8883) - Requires Certificates
listener 8883
cafile /mosquitto/config/certs/ca.crt
certfile /mosquitto/config/certs/server.crt
keyfile /mosquitto/config/certs/server.key

# Listener: WebSockets (9001)
listener 9001
protocol websockets
# WSS enabled (Secure WebSockets)
cafile /mosquitto/config/certs/ca.crt
certfile /mosquitto/config/certs/server.crt
keyfile /mosquitto/config/certs/server.key
